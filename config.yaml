# ============================================================
# YTSPERBOT - Configurazione Centrale
# Modifica questi valori senza toccare il codice Python
# ============================================================

# --- BRIEF GIORNALIERO ---
daily_brief:
  send_time: "08:00"           # orario invio brief (UTC)

# --- REPORT SETTIMANALE ---
weekly_report:
  send_day: "sunday"           # giorno invio (monday-sunday)
  send_time: "09:00"           # orario invio (UTC)

# --- CROSS SIGNAL (convergenza multi-piattaforma) ---
cross_signal:
  min_sources: 3               # minimo N fonti diverse per scattare alert
  lookback_hours: 6            # finestra temporale di analisi
  cooldown_hours: 12           # ore di cooldown per la stessa keyword
  ai_titles: true              # genera suggerimenti titoli (richiede ANTHROPIC_API_KEY)

# --- NEWS API (NewsAPI.org — piano free: 100 req/giorno) ---
news_api:
  check_interval_hours: 6      # frequenza controllo
  keywords_per_run: 10         # keyword da interrogare per run (rispetta quota)
  languages: ["en", "it"]      # lingue da monitorare
  lookback_hours: 48           # finestra articoli recenti
  velocity_threshold: 200      # % crescita menzioni per scattare alert

# --- PRIORITY SCORE ---
priority_score:
  min_score: 3                 # score minimo per ricevere l'alert (1-10)

# --- PINTEREST ---
pinterest:
  check_interval_hours: 6          # frequenza controllo API
  regions: ["IT", "US"]            # regioni da monitorare
  velocity_threshold: 30           # % crescita settimanale per alertare

# --- COMPETITOR MONITOR ---
competitor_monitor:
  new_video_max_age_hours: 48        # ignora video più vecchi di N ore al primo avvio
  subscriber_growth_threshold: 0.10  # % crescita in 7 giorni per scattare alert (0.10 = 10%)
  subscriber_check_time: "09:00"     # orario controllo iscritti (UTC)

# --- TREND DETECTOR ---
trend_detector:
  check_interval_hours: 4
  velocity_threshold_longform: 300    # % in 48h per video lunghi
  velocity_threshold_shorts: 500      # % in 24h per shorts
  lookback_hours_longform: 48
  lookback_hours_shorts: 24
  min_mentions_to_track: 3            # ignora keyword con meno di N menzioni (evita falsi positivi)

# --- SCRAPER CANALI OUTPERFORMER ---
scraper:
  max_followers: 80000
  min_followers: 1000
  multiplier_threshold: 3.0           # es. 3.0 = almeno 3x la media del canale
  lookback_days: 30
  languages: ["it", "en"]
  max_channels_per_run: 400           # limite canali analizzati per run (gestione quota)
  run_time: "03:00"                   # orario esecuzione giornaliera (formato HH:MM)

