services:
  - type: web
    name: ytsperbot
    runtime: python
    buildCommand: pip install -r requirements.txt && cd webapp && npm install && npm run build
    startCommand: python -u main.py
    plan: free
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: REDDIT_USER_AGENT
        value: ytsperbot/1.0
      - key: NODE_VERSION
        value: "22"
      - key: APIFY_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: PINTEREST_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DASHBOARD_TOKEN
        sync: false
